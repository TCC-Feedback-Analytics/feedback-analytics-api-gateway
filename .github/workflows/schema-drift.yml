name: Schema drift (guard-rail ADR-0001)

# Fase 1 do ADR-0001 (docs/adr/0001-fonte-unica-de-schema.md): enquanto o schema
# vive em duas representações (drizzle/ e db/schema/), este job torna o drift do
# schema LOCAL uma FALHA de CI. Sobe o mesmo Postgres do docker-compose, monta o
# schema via db/schema/ (scripts/db-local.mjs) e compara o pg_dump do schema
# `public` com o golden versionado db/schema/.drift-snapshot.sql. Mudou o schema
# local sem regenerar o golden (e espelhar em drizzle/ + db/cutover/) → quebra.

on:
  push:
    branches: [main, developer]
    paths:
      - 'db/**'
      - 'drizzle/**'
      - 'scripts/db-local.mjs'
      - 'scripts/schema-drift.mjs'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/schema-drift.yml'
  pull_request:
    branches: [main, developer]
    paths:
      - 'db/**'
      - 'drizzle/**'
      - 'scripts/db-local.mjs'
      - 'scripts/schema-drift.mjs'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/schema-drift.yml'

jobs:
  drift:
    name: schema-drift
    runs-on: ubuntu-latest
    env:
      # Aponta para o Postgres do docker-compose (host 5433 -> container 5432).
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/feedback
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Resolver @feedback/lib-shared (ssh->https, repo público)
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Subir Postgres local (mesma imagem/porta do docker-compose)
        run: docker compose up -d db

      - name: Aguardar Postgres aceitar conexão
        run: |
          for i in $(seq 1 30); do
            if docker exec feedback-api-db pg_isready -U postgres -d feedback >/dev/null 2>&1; then
              echo "postgres pronto (tentativa $i)"; exit 0
            fi
            sleep 2
          done
          echo "timeout aguardando postgres"; docker logs feedback-api-db; exit 1

      - name: Montar schema local (db/schema via db-local.mjs, sem seed e2e)
        run: node scripts/db-local.mjs

      - name: Checar drift do schema (vs db/schema/.drift-snapshot.sql)
        run: npm run db:drift:check
