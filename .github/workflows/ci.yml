name: CI Pipeline - API Gateway

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

jobs:
  quality:
    name: lint-typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Resolver @feedback/lib-shared (ssh->https, repo público)
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Typecheck (sem testes)
        run: ./node_modules/.bin/tsc -p tsconfig.ci.json --noEmit

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Resolver @feedback/lib-shared (ssh->https, repo público)
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test
