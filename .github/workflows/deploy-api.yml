name: Deploy Api Gateway (Vercel)

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: "Digite ok para confirmar deploy."
        required: true
        type: string

concurrency:
  group: deploy-api-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-api-gateway:
    runs-on: ubuntu-latest

    steps:
      - name: Validação manual de requests
        run: |
          if [ "${{ github.ref_name }}" != "developer" ] && [ "${{ github.ref_name }}" != "main" ]; then
            echo "Este workflow deve ser executado apenas nas branches main ou developer"
            exit 1
          fi

          if [ "${{ github.event.inputs.confirm_deploy }}" != "ok" ]; then
            echo "Confirme o deploy informando ok"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Resolver @feedback/lib-shared (ssh->https, repo público)
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Bundle api-gateway
        run: |
          ./node_modules/.bin/esbuild index.ts \
            --bundle \
            --platform=node \
            --target=node20 \
            --outfile=_bundle.cjs \
            --format=cjs

      - name: Deploy preview (developer)
        if: github.ref_name == 'developer'
        id: deploy-dev
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API_GATEWAY }}
        run: |
          URL=$(npx vercel deploy --yes --token "$VERCEL_TOKEN" --local-config vercel.json)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Atribuir alias fixo ao developer
        if: github.ref_name == 'developer'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel alias set ${{ steps.deploy-dev.outputs.url }} feedback-analytics-api-developer.vercel.app --token "$VERCEL_TOKEN"

      - name: Deploy production (main)
        if: github.ref_name == 'main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API_GATEWAY }}
        run: npx vercel deploy --yes --prod --token "$VERCEL_TOKEN" --local-config vercel.json
